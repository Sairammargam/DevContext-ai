# DevContext Daemon Configuration
# Reads additional configuration from ~/.devctx/config.yml

spring:
  application:
    name: devctx-daemon

  config:
    import:
      - optional:file:${user.home}/.devctx/config.yml

  # Disable HTTP server - Unix socket only
  main:
    web-application-type: none
    keep-alive: true

  # Disable auto-configuration for components that require PostgreSQL and OpenAI
  # LLMProviderConfig.java handles provider configuration dynamically
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  # AI Configuration - handled by LLMProviderConfig.java based on devctx.llm.* settings
  ai:
    openai:
      chat:
        options:
          temperature: 0.7

# Database configuration for vector store (enable when PostgreSQL is ready)
# spring:
#   datasource:
#     url: jdbc:postgresql://localhost:5432/devctx
#     username: ${DEVCTX_DB_USER:devctx}
#     password: ${DEVCTX_DB_PASSWORD:devctx}

# DevContext specific configuration
devctx:
  # Socket path for CLI communication
  socket:
    path: ${user.home}/.devctx/daemon.sock

  # Index configuration
  index:
    # Path to index storage directory
    store: ${user.home}/.devctx/index
    # File patterns to include
    include:
      - "**/*.java"
      - "**/*.go"
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.rs"
    # File patterns to exclude
    exclude:
      - "**/node_modules/**"
      - "**/vendor/**"
      - "**/target/**"
      - "**/build/**"
      - "**/.git/**"

  # Embedding configuration
  embedding:
    chunk-size: 1000
    chunk-overlap: 200

# Logging configuration
logging:
  level:
    dev.devctx: INFO
    org.springframework.ai: INFO
  file:
    path: ${user.home}/.devctx/logs
    name: ${user.home}/.devctx/logs/daemon.log
