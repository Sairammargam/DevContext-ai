# DevContext Daemon Configuration
# Reads additional configuration from ~/.devctx/config.yml

spring:
  application:
    name: devctx-daemon

  config:
    import:
      - optional:file:${user.home}/.devctx/config.yml

  # Disable HTTP server - Unix socket only
  main:
    web-application-type: none
    keep-alive: true

  # Disable auto-configuration - LLMProviderConfig.java handles provider configuration dynamically
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

  # AI Configuration - handled by LLMProviderConfig.java based on devctx.llm.* settings
  ai:
    openai:
      chat:
        options:
          temperature: 0.7

  # Database configuration for PgVector (optional - enable with DEVCTX_PGVECTOR_ENABLED=true)
  datasource:
    url: ${DEVCTX_DB_URL:jdbc:postgresql://localhost:5432/devctx}
    username: ${DEVCTX_DB_USER:devctx}
    password: ${DEVCTX_DB_PASSWORD:devctx}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # PgVector configuration
  ai.vectorstore.pgvector:
    index-type: HNSW
    distance-type: COSINE_DISTANCE
    dimensions: ${devctx.embedding.dimensions:1536}

# DevContext specific configuration
devctx:
  # Socket path for CLI communication
  socket:
    path: ${user.home}/.devctx/daemon.sock

  # PgVector toggle (set DEVCTX_PGVECTOR_ENABLED=true to enable)
  pgvector:
    enabled: ${DEVCTX_PGVECTOR_ENABLED:false}

  # Index configuration
  index:
    # Path to index storage directory
    store: ${user.home}/.devctx/index
    # File patterns to include
    include:
      - "**/*.java"
      - "**/*.go"
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.rs"
    # File patterns to exclude
    exclude:
      - "**/node_modules/**"
      - "**/vendor/**"
      - "**/target/**"
      - "**/build/**"
      - "**/.git/**"

  # Embedding configuration
  embedding:
    chunk-size: 1000
    chunk-overlap: 200
    dimensions: 1536

  # RAG configuration
  rag:
    top-k: 5
    similarity-threshold: 0.7

# Logging configuration
logging:
  level:
    dev.devctx: INFO
    org.springframework.ai: INFO
  file:
    path: ${user.home}/.devctx/logs
    name: ${user.home}/.devctx/logs/daemon.log
