# DevContext AI - GoReleaser Configuration
# Documentation: https://goreleaser.com

project_name: devctx

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: devctx
    main: ./cli
    binary: devctx
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: devctx
    name: devctx
  draft: false
  prerelease: auto
  mode: replace
  extra_files:
    - glob: ./daemon/target/daemon.jar

brews:
  - name: devctx
    repository:
      owner: devctx
      name: homebrew-devctx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    folder: Formula
    homepage: "https://github.com/devctx/devctx"
    description: "AI-powered codebase intelligence for your terminal"
    license: "MIT"
    dependencies:
      - name: openjdk@21
        type: optional
    install: |
      bin.install "devctx"
    test: |
      system "#{bin}/devctx", "--help"
    caveats: |
      To get started, run:
        devctx init

      The daemon requires Java 21+. Install with:
        brew install openjdk@21

scoops:
  - repository:
      owner: devctx
      name: scoop-devctx
    homepage: "https://github.com/devctx/devctx"
    description: "AI-powered codebase intelligence for your terminal"
    license: MIT

nfpms:
  - id: devctx
    package_name: devctx
    vendor: DevContext
    homepage: "https://github.com/devctx/devctx"
    maintainer: "DevContext <support@devctx.dev>"
    description: "AI-powered codebase intelligence for your terminal"
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - git

dockers:
  - image_templates:
      - "ghcr.io/devctx/devctx:{{ .Version }}"
      - "ghcr.io/devctx/devctx:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

announce:
  skip: true
